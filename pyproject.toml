[tool.ruff]
target-version = "py312"

[tool.uv]
package = false

[tool.uv.workspace]
members = ["src/affairon"]
exclude = ["src/affairon/examples"]

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.1.0",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "N",
    "UP",
    "B",
]

[tool.ruff.lint.isort]
known-first-party = ["affairon"]

[tool.ruff.lint.per-file-ignores]
"src/affairon/affairon/__init__.py" = ["E402"]
"src/affairon/examples/duel/duelsample/duelsample/nodes.py" = ["F821"]

[tool.pytest.ini_options]
testpaths = ["src/affairon/tests"]
asyncio_mode = "auto"

[tool.pyright]
exclude = ["**/.venv", "src/affairon/examples/duel/**"]
extraPaths = [
    "src/affairon/tests",
    "src/affairon/examples/duel/duelsample",
    "src/affairon/examples/egg/eggsample",
]
